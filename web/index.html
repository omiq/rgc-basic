<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CBM-BASIC in Browser</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 1em auto; padding: 0 1em; }
    h1 { font-size: 1.2em; }
    textarea { width: 100%; height: 200px; font-family: monospace; }
    #output { background: #1e1e1e; color: #d4d4d4; padding: 1em; min-height: 150px; white-space: pre-wrap; }
    button { font-size: 1em; padding: 0.3em 0.8em; margin-right: 0.5em; }
    .error { color: #f14c4c; }
  </style>
</head>
<body>
  <h1>CBM-BASIC</h1>
  <p>Enter a BASIC program and click Run. Output appears below.</p>
  <textarea id="program" placeholder="10 PRINT &quot;HELLO, WORLD!&quot;&#10;20 END">10 PRINT "HELLO, WORLD!"
20 END</textarea>
  <p>
    <button id="run">Run</button>
  </p>
  <div id="output"></div>

  <script src="basic.js"></script>
  <script>
    const output = document.getElementById('output');
    const runBtn = document.getElementById('run');
    const programEl = document.getElementById('program');

    /* Custom stdin: one prompt per line. Never return null (avoid EOF) so subsequent RUNs keep working. */
    var inputBuffer = [];

    function clearOutput() {
      output.textContent = '';
      output.classList.remove('error');
    }

    function appendOutput(text, isError) {
      output.textContent += text;
      if (isError) output.classList.add('error');
    }

    Basic({
      preRun: [function() {
        function stdin() {
          if (inputBuffer.length > 0) return inputBuffer.shift();
          var line = window.prompt('? ');
          if (line === null) line = '';
          for (var i = 0; i < line.length; i++) inputBuffer.push(line.charCodeAt(i) & 0xFF);
          inputBuffer.push(10);
          return inputBuffer.shift();
        }
        FS.init(stdin, null, null);
      }]
    }).then(function(Module) {
      Module.print = function(text) { appendOutput(text); };
      Module.printErr = function(text) { appendOutput(text, true); };

      runBtn.disabled = false;
      runBtn.onclick = function() {
        clearOutput();
        inputBuffer = [];
        const prog = programEl.value;
        try {
          Module.FS.writeFile('/program.bas', prog);
          Module.ccall('basic_load_and_run', null, ['string'], ['/program.bas']);
        } catch (e) {
          appendOutput('Error: ' + e.message, true);
        }
      };
    }).catch(function(e) {
      output.textContent = 'Failed to load BASIC: ' + e;
      output.classList.add('error');
    });
  </script>
</body>
</html>
