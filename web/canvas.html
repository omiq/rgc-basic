<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CBM-BASIC Canvas (PETSCII)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 1em auto; padding: 0 1em; }
    h1 { font-size: 1.2em; }
    textarea { width: 100%; height: 160px; font-family: ui-monospace, monospace; font-size: 13px; }
    #screenWrap { background: #222; padding: 8px; border-radius: 6px; display: inline-block; }
    /* Solid C64-blue behind canvas so it never looks “black” if pixels are transparent */
    #screen {
      display: block;
      background-color: rgb(0, 0, 170);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%;
      height: auto;
    }
    #log {
      background: #1e1e1e;
      color: #ccc;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      padding: 0.5em;
      max-height: 120px;
      overflow: auto;
      white-space: pre-wrap;
      margin-top: 0.5em;
    }
    #inputLineRow { display: none; margin-top: 0.5em; align-items: center; gap: 0.5em; }
    #inputLineRow.active { display: flex; }
    #inputLine { flex: 1; font-family: ui-monospace, monospace; padding: 0.35em 0.5em; }
    .hint { font-size: 0.85em; color: #555; }
  </style>
</head>
<body>
  <h1>CBM-BASIC — Canvas (40×25 PETSCII)</h1>
  <p class="hint">Uses the GfxVideoState text screen. <strong>Rebuild both</strong> <code>basic-canvas.js</code> and <code>basic-canvas.wasm</code> together (<code>make basic-wasm-canvas</code>). This page loads them with the <strong>same</strong> cache-bust query so they cannot get out of sync.</p>
  <textarea id="program">10 PRINT "{CLR}{WHT}HELLO FROM CANVAS"
20 LOCATE 0,12: PRINT "POKE 1024,1 : PEEK(1024)"
30 END</textarea>
  <p><button id="run" disabled>Run</button></p>
  <div id="screenWrap">
    <canvas id="screen" width="320" height="200" tabindex="0"></canvas>
  </div>
  <div id="inputLineRow">
    <label id="inputLabel" for="inputLine">INPUT</label>
    <input type="text" id="inputLine" autocomplete="off" spellcheck="false" />
  </div>
  <div id="log" aria-live="polite"></div>

  <script>
(function() {
  /* One version id for BOTH .js and .wasm — avoids “cache-busted JS + stale WASM” black screen */
  var CACHEBUST = String(Date.now());

  var canvas = document.getElementById('screen');
  var ctx = canvas.getContext('2d', { alpha: false });
  var runBtn = document.getElementById('run');
  var programEl = document.getElementById('program');
  var logEl = document.getElementById('log');
  var inputLineRow = document.getElementById('inputLineRow');
  var inputLineEl = document.getElementById('inputLine');
  var inputLabelEl = document.getElementById('inputLabel');

  var rgbaPtr = 0;
  var rgbaSize = 320 * 200 * 4;
  var frameErrCount = 0;
  /* While basic_load_and_run_gfx is suspended (Asyncify), do not call other wasm exports
     from rAF — re-entry deadlocks the tab (e.g. during INPUT). */
  var wasmRunPending = false;

  function heapU8() {
    var M = window.Module;
    return (M && (M['HEAPU8'] || M.HEAPU8)) || null;
  }

  /* Linear memory backing the heap. Older glue: Module.asm.memory + Module.HEAPU8.
     Newer Emscripten often keeps WebAssembly.Memory in global wasmMemory / wasmExports
     (Module.asm may be absent). Always prefer the Memory object's .buffer — it stays
     valid when HEAPU8 was recreated after memory growth (stale typed arrays). */
  function wasmMemoryBuffer() {
    var M = window.Module;
    var g = typeof window !== 'undefined' ? window : globalThis;
    if (g && g.wasmMemory && g.wasmMemory.buffer) {
      return g.wasmMemory.buffer;
    }
    if (g && g.wasmExports && g.wasmExports.memory && g.wasmExports.memory.buffer) {
      return g.wasmExports.memory.buffer;
    }
    if (!M) return null;
    var wm = M['wasmMemory'] || M.wasmMemory;
    if (wm && wm.buffer) {
      return wm.buffer;
    }
    if (M.asm && M.asm.memory && M.asm.memory.buffer) {
      return M.asm.memory.buffer;
    }
    if (M.buffer) {
      return M.buffer;
    }
    var h8 = heapU8();
    if (h8 && h8.buffer) {
      return h8.buffer;
    }
    if (M.HEAP8 && M.HEAP8.buffer) {
      return M.HEAP8.buffer;
    }
    return null;
  }

  function copyHeapToRgba(dstU8, ptr, len) {
    var p = ((typeof ptr === 'bigint' ? Number(ptr) : ptr) >>> 0);
    if (!p || !len) return false;
    var buf = wasmMemoryBuffer();
    if (buf && p + len <= buf.byteLength) {
      try {
        dstU8.set(new Uint8Array(buf, p, len));
        return true;
      } catch (e0) { /* fall through to HEAPU8 */ }
    }
    var h = heapU8();
    if (h) {
      try {
        dstU8.set(h.subarray(p, p + len));
        return true;
      } catch (e) { /* ignore */ }
    }
    return false;
  }

  function clearRgbaBuffer(ptr, len) {
    var p = ((typeof ptr === 'bigint' ? Number(ptr) : ptr) >>> 0);
    var h = heapU8();
    if (h && typeof h.fill === 'function') {
      try {
        h.fill(0, p, p + len);
        return;
      } catch (e) { /* fall through */ }
    }
    var buf = wasmMemoryBuffer();
    if (buf && p + len <= buf.byteLength) {
      new Uint8Array(buf, p, len).fill(0);
    }
  }

  function appendLog(text, err) {
    logEl.textContent += text;
    if (err) logEl.style.color = '#f88';
  }

  function pollUi() {
    var M = window.Module;
    if (M && M.wasmWaitingKey) {
      canvas.style.outline = '2px solid #0dbc79';
    } else {
      canvas.style.outline = 'none';
    }
    requestAnimationFrame(pollUi);
  }
  requestAnimationFrame(pollUi);

  window.Module = {
    locateFile: function(path) {
      if (path.endsWith('.wasm')) {
        return path + '?cb=' + CACHEBUST;
      }
      return path;
    },
    print: function(t) { appendLog(t); },
    printErr: function(t) { appendLog(t, true); },
    onWasmNeedInputLine: function() {
      var M = window.Module;
      inputLabelEl.textContent =
        (typeof M.wasmInputLabel === 'string' && M.wasmInputLabel.length)
          ? M.wasmInputLabel
          : 'INPUT';
      inputLineRow.classList.add('active');
      inputLineEl.value = '';
      inputLineEl.focus();
    },
    onRuntimeInitialized: function() {
      var M = window.Module;
      if (typeof M.ccall !== 'function') {
        appendLog('Runtime error: ccall missing — put inline script BEFORE basic-canvas.js.\n', true);
        return;
      }
      rgbaPtr = M._malloc(rgbaSize);
      if (!rgbaPtr) {
        appendLog('_malloc failed for framebuffer.\n', true);
        return;
      }
      clearRgbaBuffer(rgbaPtr, rgbaSize);
      try {
        M.ccall('wasm_gfx_set_video', null, [], []);
        M.ccall('wasm_gfx_render_rgba', null, ['number', 'number'], [rgbaPtr, rgbaSize]);
        var img0 = ctx.createImageData(320, 200);
        if (!copyHeapToRgba(img0.data, rgbaPtr, rgbaSize)) {
          appendLog('Could not read framebuffer after init.\n', true);
        } else {
          ctx.putImageData(img0, 0, 0);
          var d = img0.data;
          if (d[3] === 0) {
            appendLog('Warning: framebuffer alpha is 0 — check WASM/JS match (make basic-wasm-canvas).\n', true);
          }
        }
      } catch (e) {
        appendLog('Init canvas: ' + e + '\n', true);
      }
      /* INPUT: C renders to a shadow buffer and passes ptr here — no wasm ccall (Asyncify deadlock). */
      var shadowImg = ctx.createImageData(320, 200);
      M.onWasmGfxPaintShadow = function(ptr, nbytes) {
        var p = ((typeof ptr === 'bigint' ? Number(ptr) : ptr) >>> 0);
        var n = nbytes | 0;
        if (n !== rgbaSize || p === 0) return;
        if (!copyHeapToRgba(shadowImg.data, p, n)) return;
        ctx.putImageData(shadowImg, 0, 0);
      };

      runBtn.disabled = false;
      runBtn.onclick = function() {
        var Mo = window.Module;
        logEl.textContent = '';
        logEl.style.color = '#ccc';
        frameErrCount = 0;
        inputLineRow.classList.remove('active');
        inputLabelEl.textContent = 'INPUT';
        Mo.wasmInputLabel = 'INPUT';
        var prog = programEl.value;
        var flags = '-petscii -palette c64 -charset lower -columns 40';
        var rc = Mo.ccall('basic_apply_arg_string', 'number', ['string'], [flags]);
        if (rc !== 0) {
          appendLog('Invalid interpreter options.\n', true);
          return;
        }
        Mo.FS.writeFile('/program.bas', prog);
        canvas.focus();
        wasmRunPending = true;
        try {
          Mo.ccall('basic_load_and_run_gfx', null, ['string'], ['/program.bas'], { async: true })
            .catch(function(e) {
              appendLog(String(e && e.message ? e.message : e) + '\n', true);
            })
            .finally(function() {
              wasmRunPending = false;
            });
        } catch (e) {
          wasmRunPending = false;
          appendLog(String(e && e.message ? e.message : e) + '\n', true);
        }
      };

      var imgBuf = ctx.createImageData(320, 200);

      function frame() {
        var Mo = window.Module;
        /* Do not require HEAPU8 here — some local emcc builds expose heap views differently;
           copyHeapToRgba falls back to wasmMemoryBuffer(). */
        if (wasmRunPending) {
          requestAnimationFrame(frame);
          return;
        }
        if (rgbaPtr && typeof Mo.ccall === 'function') {
          try {
            Mo.ccall('wasm_gfx_render_rgba', null, ['number', 'number'], [rgbaPtr, rgbaSize]);
            if (copyHeapToRgba(imgBuf.data, rgbaPtr, rgbaSize)) {
              ctx.putImageData(imgBuf, 0, 0);
            } else if (frameErrCount < 3) {
              frameErrCount++;
              appendLog('frame: could not read RGBA from WASM heap (ptr=' + rgbaPtr + ').\n', true);
            }
          } catch (e) {
            frameErrCount++;
            if (frameErrCount <= 3) {
              appendLog('frame: ' + e + '\n', true);
            }
          }
        }
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      document.addEventListener('keydown', function(ev) {
        var Mo = window.Module;
        if (inputLineRow.classList.contains('active')) return;
        if (ev.target === programEl || ev.target === inputLineEl) return;
        if (document.activeElement !== canvas) return;
        ev.preventDefault();
        var code = ev.keyCode || ev.which;
        if (code === 13) {
          Mo.ccall('wasm_push_key', null, ['number'], [13]);
        } else if (ev.key && ev.key.length === 1) {
          Mo.ccall('wasm_push_key', null, ['number'], [ev.key.charCodeAt(0) & 0xFF]);
        }
      }, true);

      inputLineEl.addEventListener('keydown', function(ev) {
        var Mo = window.Module;
        if (ev.key === 'Enter') {
          ev.preventDefault();
          Mo.wasmInputLineText = inputLineEl.value;
          Mo.wasmInputLineReady = 1;
          inputLineRow.classList.remove('active');
          canvas.focus();
        }
      });
    },
    onAbort: function(what) {
      appendLog('Aborted: ' + String(what || '') + '\n', true);
    }
  };

  var scr = document.createElement('script');
  scr.src = 'basic-canvas.js?cb=' + encodeURIComponent(CACHEBUST);
  scr.async = false;
  scr.onerror = function() {
    appendLog('Failed to load basic-canvas.js\n', true);
  };
  document.body.appendChild(scr);
})();
  </script>
</body>
</html>
